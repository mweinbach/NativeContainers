name: NativeContainers

options:
  bundleIdPrefix: com.nativecontainers
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CLANG_ENABLE_MODULES: YES
    CODE_SIGN_STYLE: Automatic

packages:
  AppleContainer:
    url: https://github.com/apple/container.git
    exactVersion: 1.0.0
  AppleContainerization:
    url: https://github.com/apple/containerization.git
    exactVersion: 0.33.3
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    exactVersion: 1.13.0
  SwiftSystem:
    url: https://github.com/apple/swift-system.git
    from: 1.6.4
  SwiftNIO:
    url: https://github.com/apple/swift-nio.git
    from: 2.80.0
  SwiftLog:
    url: https://github.com/apple/swift-log.git
    from: 1.0.0

targets:
  NativeContainers:
    type: application
    platform: macOS
    entitlements:
      path: NativeContainers/NativeContainers.entitlements
      properties:
        com.apple.security.virtualization: true
    sources:
      - path: NativeContainers
      - path: NativeContainersShared
    dependencies:
      - target: NativeContainersBuildWorker
        embed: true
        link: false
        codeSign: true
        removeHeaders: false
        copy:
          destination: wrapper
          subpath: Contents/Helpers
      - package: AppleContainer
        product: ContainerAPIClient
      - package: AppleContainer
        product: ContainerResource
      - package: AppleContainer
        product: ContainerPersistence
      - package: AppleContainer
        product: TerminalProgress
      - package: AppleContainer
        product: MachineAPIClient
      - package: AppleContainerization
        product: ContainerizationOS
      - package: AppleContainerization
        product: ContainerizationOCI
      - package: AppleContainerization
        product: ContainerizationExtras
      - package: SwiftTerm
        product: SwiftTerm
      - package: SwiftSystem
        product: SystemPackage
      - sdk: Virtualization.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nativecontainers.app
        PRODUCT_NAME: NativeContainers
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: NativeContainers
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        ENABLE_APP_SANDBOX: NO
        DEAD_CODE_STRIPPING: YES
    scheme:
      testTargets:
        - NativeContainersTests
      gatherCoverageData: true

  NativeContainersTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NativeContainersTests
    dependencies:
      - target: NativeContainers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nativecontainers.tests
        GENERATE_INFOPLIST_FILE: YES

  NativeContainersBuildWorker:
    type: tool
    platform: macOS
    sources:
      - path: NativeContainersBuildWorker
      - path: NativeContainersShared
    dependencies:
      - package: AppleContainer
        product: ContainerAPIClient
      - package: AppleContainer
        product: ContainerBuild
      - package: AppleContainer
        product: ContainerImagesService
      - package: AppleContainer
        product: ContainerPersistence
      - package: AppleContainer
        product: ContainerResource
      - package: AppleContainer
        product: TerminalProgress
      - package: AppleContainerization
        product: Containerization
      - package: AppleContainerization
        product: ContainerizationOCI
      - package: AppleContainerization
        product: ContainerizationOS
      - package: SwiftSystem
        product: SystemPackage
      - package: SwiftNIO
        product: NIOPosix
      - package: SwiftLog
        product: Logging
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nativecontainers.build-worker
        PRODUCT_NAME: NativeContainersBuildWorker
        ENABLE_APP_SANDBOX: NO
        DEAD_CODE_STRIPPING: YES
